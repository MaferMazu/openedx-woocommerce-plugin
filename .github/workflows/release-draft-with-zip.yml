name: Create draft release with zip on tag

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to create or update draft release and upload zip to
        required: true
        type: string

jobs:
  create_or_update_draft_release_with_zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Resolve release tag
      id: resolve_tag
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        else
          echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
        fi

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ steps.resolve_tag.outputs.release_tag }}

    - name: Install Composer dependencies
      uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4
      with:
        composer-options: "--no-dev"

    - name: Prepare the openedx-commerce directory for the release
      run: make release

    - name: Create a zip file
      uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 # 0.7.6
      with:
        type: 'zip'
        command: 'cd ./openedx-commerce'
        filename: '../openedx-commerce.zip'

    - name: Create or update draft GitHub release with autogenerated notes
      env:
        GH_TOKEN: ${{ secrets.WC_PAT }}
        RELEASE_TAG: ${{ steps.resolve_tag.outputs.release_tag }}
      run: |
        if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
          gh release edit "$RELEASE_TAG" --draft
        else
          gh release create "$RELEASE_TAG" --draft --generate-notes --verify-tag
        fi

    - name: Upload zip to the draft GitHub release
      env:
        GH_TOKEN: ${{ secrets.WC_PAT }}
        RELEASE_TAG: ${{ steps.resolve_tag.outputs.release_tag }}
      run: gh release upload "$RELEASE_TAG" openedx-commerce.zip --clobber
